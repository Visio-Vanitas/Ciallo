listen: ":25565"
max_handshake_size: 65536
max_status_response_size: 262144

timeouts:
  handshake: "3s"
  backend_dial: "3s"
  idle: "10m"
  shutdown: "10s"

status_cache:
  enabled: true
  ttl: "5s"

motd_cache:
  enabled: true
  fallback_ttl: "5m"

status_fallback:
  version_name: "ciallo fallback"
  players_max: 0

backend_health:
  enabled: true
  interval: "10s"
  timeout: "3s"
  failure_threshold: 2
  success_threshold: 1
  probe_protocol: 772
  probe_host: ""
  circuit_breaker_ttl: "30s"
  status_fallback_when_unhealthy: true

fail2ban:
  # Experimental in v0.0.6. Disabled by default.
  enabled: false
  max_failures: 5
  window: "1m"
  ban_duration: "10m"
  early_disconnect: "5s"

management:
  # Local-only management surface for health, readiness, metrics, and fail2ban operations.
  # Endpoints: GET /healthz, GET /readyz, GET /metrics, GET/DELETE /fail2ban/bans.
  enabled: false
  address: "127.0.0.1:25575"

pool:
  enabled: false
  max_idle_per_backend: 8
  idle_timeout: "30s"

routes:
  - hosts:
      - "survival.example.com"
      - "mc.example.com"
    backend: "127.0.0.1:25566"
    status_cache: true
  - hosts:
      - "creative.example.com"
    backend: "127.0.0.1:25567"
    status_cache: true

default_backend: "127.0.0.1:25566"

logging:
  level: "info"
  format: "text"
  output: "stdout"
  add_source: false
  file:
    # Required only when output is "file".
    path: "logs/ciallo.log"
    max_size_mb: 100
    max_backups: 7
    max_age_days: 14
    compress: true
